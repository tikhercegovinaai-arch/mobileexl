<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>mobile</title>
    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
    <!-- Import meta polyfill - must load before bundle -->
    <script>
    // Polyfill import.meta
    (function() {
      if (typeof globalThis.importMeta === 'undefined') {
        Object.defineProperty(globalThis, 'importMeta', {
          value: {
            url: window.location.href,
            env: {}
          },
          writable: true,
          configurable: true
        });
      }
    })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  <script src="/index.ts.bundle?platform=web&dev=true&hot=false&lazy=true&transform.engine=hermes&transform.routerRoot=app&unstable_transformProfile=hermes-stable" defer></script></body>
</html>
